<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <!-- Background gradient - rich green -->
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d369"/>
      <stop offset="100%" stop-color="#1a9a3e"/>
    </linearGradient>
    <!-- Glossy highlight overlay -->
    <linearGradient id="gloss" x1="128" y1="0" x2="128" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Bottom shadow for 3D depth -->
    <linearGradient id="shadow" x1="128" y1="180" x2="128" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Drop shadow for wallet -->
    <filter id="walletShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0a5c25" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Green rounded square background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Bottom shadow for 3D depth -->
  <rect width="256" height="256" rx="56" fill="url(#shadow)"/>

  <!-- Glossy highlight on top -->
  <rect width="256" height="160" rx="56" fill="url(#gloss)"/>

  <!-- White solid wallet icon -->
  <g transform="translate(40, 44) scale(0.6875)" fill="white" filter="url(#walletShadow)">
    <!-- Phosphor Wallet Bold - solid filled -->
    <path d="M216,64H56A16,16,0,0,1,56,32H192a8,8,0,0,0,0-16H56A32,32,0,0,0,24,48V192a32,32,0,0,0,32,32H216a16,16,0,0,0,16-16V80A16,16,0,0,0,216,64Zm0,144H56a16,16,0,0,1-16-16V77.4A31.24,31.24,0,0,0,56,80H216Zm-36-68a12,12,0,1,1,12-12A12,12,0,0,1,180,140Z"/>
  </g>

  <!-- Green accent dot on wallet -->
  <circle cx="163" cy="139" r="8.5" fill="#0f7a34"/>
</svg>
